name: 🎯 Product Pipeline
on:
  push:
    branches: [main]
    paths:
      - 'data/products.json'
      - 'mockups-input/**'
      - 'scripts/**'

jobs:
  product-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: 🎨 Generate Mockups
        run: npm run mockup:generate:all
        env:
          PRINTFUL_API_TOKEN: ${{ secrets.PRINTFUL_API_TOKEN }}
          PRINTFUL_STORE_ID: ${{ secrets.PRINTFUL_STORE_ID }}
      
      - name: 💳 Create Stripe Products
        run: npm run product:create -- --all
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      
      - name: 🖨️ Sync to Printful
        run: npm run sync-printful
        env:
          PRINTFUL_API_TOKEN: ${{ secrets.PRINTFUL_API_TOKEN }}
          PRINTFUL_STORE_ID: ${{ secrets.PRINTFUL_STORE_ID }}
      
      - name: 📦 Publish to Store
        run: npm run ingest-store
      
      - name: Commit changes
        run: |
          git config user.name "D.I.A. Bot"
          git config user.email "bot@doitanyways.com"
          git add -A
          git commit -m "🚀 Auto: Product pipeline execution" || true
          git push origin main || true
      
      - name: 🚀 Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './public'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "🎯 Product Pipeline Deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 1
