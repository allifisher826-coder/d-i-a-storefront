name: POD Validation & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Products
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate product data
        run: npm run validate
      
      - name: Validate HTML
        run: |
          npm install -g html-validate
          html-validate index.html || true
      
      - name: Check for demo language
        run: |
          if grep -r "Demo mode\|demo\|test card" index.html output/listings/*.txt 2>/dev/null; then
            echo "❌ Found demo/test language in production code"
            exit 1
          fi
          echo "✓ No demo language found"
      
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './.github/lighthouse.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  deploy:
    name: Deploy to Netlify
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: '.'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deploy: ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: ✅ Deploy Success
        run: echo "Product live at your-site.netlify.app"

  pod-sync:
    name: Sync Published Products to Printful
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[pod]')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Sync to Printful
        run: npm run sync-printful
        env:
          PRINTFUL_API_TOKEN: ${{ secrets.PRINTFUL_API_TOKEN }}
      
      - name: Ingest to Store
        run: npm run ingest-store
      
      - name: Commit changes
        run: |
          git config user.email "automation@d-i-a.nz"
          git config user.name "D.I.A. Automation"
          git add -A
          git commit -m "🚀 Auto-published products [skip ci]" || echo "No changes to commit"
          git push origin main
      
      - name: ✅ Products Published
        run: echo "Products live on store and Printful"
