<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | D.I.A.</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%23000' width='32' height='32' rx='4'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='16' font-weight='900' fill='%23B91C1C' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#050505;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;text-align:center;padding:24px}
    .code{font-family:'Bebas Neue',sans-serif;font-size:clamp(100px,20vw,180px);color:#B91C1C;line-height:1;margin-bottom:8px;letter-spacing:4px}
    h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,4vw,28px);letter-spacing:6px;text-transform:uppercase;margin-bottom:16px;color:rgba(255,255,255,.7)}
    p{font-size:14px;color:rgba(255,255,255,.4);max-width:360px;line-height:1.7;margin-bottom:32px}
    .back{display:inline-block;background:#B91C1C;color:#fff;padding:14px 36px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border-radius:6px;transition:all .2s}
    .back:hover{background:#DC2626;transform:translateY(-1px)}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Head back to the store.</p>
  <a href="/" class="back">Back to Store</a>
</body>
</html>
