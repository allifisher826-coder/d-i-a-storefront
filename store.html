<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="D.I.A. — Culture of Getting It Done. Premium streetwear engineered for discipline.">
  <meta name="keywords" content="streetwear, premium apparel, discipline, culture">
  <title>D.I.A. Store | Culture of Getting It Done</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --red: #B91C1C;
      --black: #000;
      --white: #fff;
      --dark: #0a0a0a;
    }
    
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Space Mono', monospace;
      background: var(--dark);
      color: var(--white);
      overflow-x: hidden;
    }
    
    .heading { 
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }
    
    /* Header */
    header {
      background: var(--black);
      border-bottom: 1px solid rgba(185, 28, 28, 0.3);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 2px;
    }
    
    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 20px;
    }
    
    .cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      background: var(--red);
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }
    
    /* Hero */
    .hero {
      background: linear-gradient(180deg, #1a1a1a 0%, var(--dark) 100%);
      padding: 100px 20px 80px;
      text-align: center;
      border-bottom: 2px solid var(--red);
    }
    
    .hero h1 {
      font-size: 56px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    
    .hero p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* Products Grid */
    .products-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 80px 20px;
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }
    
    .product-card {
      background: #111;
      border: 1px solid rgba(185, 28, 28, 0.2);
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    
    .product-card:hover {
      border-color: var(--red);
      transform: translateY(-2px);
    }
    
    .product-image {
      width: 100%;
      aspect-ratio: 1;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
    }
    
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .product-info {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    
    .product-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .product-price {
      font-size: 20px;
      color: var(--red);
      font-weight: bold;
      margin-bottom: 12px;
    }
    
    .product-description {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 15px;
      flex-grow: 1;
    }
    
    .size-selector {
      margin-bottom: 15px;
    }
    
    .size-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    
    .size-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .size-btn {
      padding: 6px 10px;
      border: 1px solid rgba(185, 28, 28, 0.3);
      background: transparent;
      color: var(--white);
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
      font-family: 'Space Mono', monospace;
    }
    
    .size-btn:hover {
      border-color: var(--red);
    }
    
    .size-btn.active {
      background: var(--red);
      border-color: var(--red);
    }
    
    .add-to-cart {
      background: var(--red);
      border: none;
      color: white;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Space Mono', monospace;
    }
    
    .add-to-cart:hover {
      background: #8B1616;
      transform: scale(1.02);
    }
    
    .add-to-cart:active {
      transform: scale(0.98);
    }
    
    /* Cart Sidebar */
    .cart-sidebar {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: var(--black);
      border-left: 2px solid var(--red);
      z-index: 100;
      transition: right 0.3s ease;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .cart-sidebar.open {
      right: 0;
    }
    
    .cart-header {
      padding: 20px;
      border-bottom: 1px solid rgba(185, 28, 28, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .cart-close {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
    
    .cart-items {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .cart-item {
      border-bottom: 1px solid rgba(185, 28, 28, 0.2);
      padding: 15px 0;
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
    }
    
    .cart-item-info {
      flex-grow: 1;
    }
    
    .cart-item-title {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    
    .cart-item-size {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .cart-item-price {
      color: var(--red);
      font-weight: bold;
    }
    
    .cart-remove {
      background: none;
      border: none;
      color: rgba(185, 28, 28, 0.6);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }
    
    .cart-footer {
      padding: 20px;
      border-top: 1px solid rgba(185, 28, 28, 0.3);
    }
    
    .cart-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(185, 28, 28, 0.2);
    }
    
    .cart-total-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .cart-total-amount {
      font-size: 18px;
      font-weight: bold;
      color: var(--red);
    }
    
    .checkout-btn {
      width: 100%;
      background: var(--red);
      border: none;
      color: white;
      padding: 15px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Space Mono', monospace;
      transition: all 0.3s;
    }
    
    .checkout-btn:hover {
      background: #8B1616;
    }
    
    .checkout-btn:disabled {
      background: rgba(185, 28, 28, 0.3);
      cursor: not-allowed;
    }
    
    .empty-cart {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    
    .modal.open {
      display: flex;
    }
    
    .modal-content {
      background: var(--black);
      border: 2px solid var(--red);
      padding: 40px;
      max-width: 500px;
      width: 90%;
      position: relative;
    }
    
    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
    }
    
    /* Footer */
    footer {
      background: var(--black);
      border-top: 1px solid rgba(185, 28, 28, 0.3);
      padding: 40px 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }
    
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 36px;
      }
      
      .products-grid {
        grid-template-columns: 1fr;
      }
      
      .cart-sidebar {
        width: 100%;
        right: -100%;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-content">
      <a href="/" class="logo">D.I.A.</a>
      <div class="cart-icon" onclick="toggleCart()">
        🛒
        <span class="cart-count" id="cart-count">0</span>
      </div>
    </div>
  </header>
  
  <!-- Hero -->
  <div class="hero">
    <h1 class="heading">CULTURE OF DISCIPLINE</h1>
    <p>Systems > Willpower. Premium streetwear engineered for execution.</p>
  </div>
  
  <!-- Products -->
  <section class="products-section">
    <div class="products-grid" id="products-grid">
      <!-- Products load here -->
    </div>
  </section>
  
  <!-- Cart Sidebar -->
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <span class="heading">CART</span>
      <button class="cart-close" onclick="toggleCart()">×</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="empty-cart">Your cart is empty</div>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span class="cart-total-label">TOTAL</span>
        <span class="cart-total-amount" id="cart-total">$0.00</span>
      </div>
      <button class="checkout-btn" id="checkout-btn" onclick="checkout()">CHECKOUT</button>
    </div>
  </div>
  
  <!-- Checkout Modal -->
  <div class="modal" id="checkout-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h2 class="heading" style="margin-bottom: 20px;">SECURE CHECKOUT</h2>
      <div id="card-element" style="border: 1px solid rgba(185, 28, 28, 0.3); padding: 12px; margin-bottom: 20px;"></div>
      <div id="card-errors" style="color: var(--red); font-size: 12px; margin-bottom: 10px;"></div>
      <button id="submit-btn" class="checkout-btn" onclick="processPayment()" style="width: 100%;">PAY NOW</button>
    </div>
  </div>
  
  <!-- Footer -->
  <footer>
    <p>© 2026 D.I.A. | Culture of Discipline | All Rights Reserved</p>
    <p style="margin-top: 10px;">Secure payments powered by Stripe</p>
  </footer>

  <script>
    // State
    let products = [];
    let cart = [];
    let stripe, elements, cardElement;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      // Load products
      await loadProducts();
      renderProducts();
      updateCart();
      
      // Initialize Stripe
      const publishableKey = document.querySelector('meta[name="stripe-key"]')?.content || 'pk_test_default';
      if (publishableKey && publishableKey !== 'pk_test_default') {
        stripe = Stripe(publishableKey);
        elements = stripe.elements();
        cardElement = elements.create('card');
        cardElement.mount('#card-element');
        
        cardElement.addEventListener('change', (event) => {
          const displayError = document.getElementById('card-errors');
          displayError.textContent = event.error ? event.error.message : '';
        });
      }
    });
    
    async function loadProducts() {
      try {
        const response = await fetch('/data/products.json');
        const data = await response.json();
        products = data.filter(p => p.published !== false);
      } catch (error) {
        console.error('Error loading products:', error);
        products = [
          {
            sku: 'DIA-SYSTEM-000',
            title: 'System 000 // Foundational Vintage Tee',
            price: 55,
            category: 'tee',
            description: 'Industrial charcoal vintage tee. Back embroidery statement.',
            colors: ['Shadow / Acid Wash Black'],
            sizes: ['XS', 'S', 'M', 'L', 'XL', '2XL', '3XL'],
            stripe_price_id: null,
          }
        ];
      }
    }
    
    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = products.map((product, idx) => `
        <div class="product-card">
          <div class="product-image">
            <img src="https://via.placeholder.com/400x400?text=${encodeURIComponent(product.title)}" alt="${product.title}" onerror="this.style.display='none'">
            <div style="text-align: center; color: rgba(255,255,255,0.3);">
              <div style="font-size: 12px;">Product Image</div>
              <div style="font-size: 10px; margin-top: 4px;">${product.sku}</div>
            </div>
          </div>
          <div class="product-info">
            <div class="product-title">${product.title}</div>
            <div class="product-price">$${product.price.toFixed(2)}</div>
            <div class="product-description">${product.description}</div>
            <div class="size-selector">
              <label class="size-label">SELECT SIZE</label>
              <div class="size-options">
                ${(product.sizes || ['M']).map(size => `
                  <button class="size-btn" data-product-idx="${idx}" data-size="${size}">${size}</button>
                `).join('')}
              </div>
            </div>
            <button class="add-to-cart" data-product-idx="${idx}" onclick="addToCart(${idx})">ADD TO CART</button>
          </div>
        </div>
      `).join('');
      
      // Add size selection
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const idx = this.dataset.productIdx;
          document.querySelectorAll(`[data-product-idx="${idx}"]`).forEach(b => b.classList.remove('active'));
          this.classList.add('active');
        });
        if (btn.dataset.size === 'M') btn.classList.add('active');
      });
    }
    
    function addToCart(productIdx) {
      const product = products[productIdx];
      const selectedSize = document.querySelector(`[data-product-idx="${productIdx}"].active`)?.dataset.size || 'M';
      
      const cartItem = {
        sku: product.sku,
        title: product.title,
        price: product.price,
        size: selectedSize,
        stripePriceId: product.stripe_price_id,
      };
      
      cart.push(cartItem);
      updateCart();
      toggleCart();
    }
    
    function removeFromCart(idx) {
      cart.splice(idx, 1);
      updateCart();
    }
    
    function updateCart() {
      const count = cart.length;
      document.getElementById('cart-count').textContent = count;
      
      const itemsContainer = document.getElementById('cart-items');
      if (count === 0) {
        itemsContainer.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
        document.getElementById('checkout-btn').disabled = true;
      } else {
        itemsContainer.innerHTML = cart.map((item, idx) => `
          <div class="cart-item">
            <div class="cart-item-info">
              <div class="cart-item-title">${item.title}</div>
              <div class="cart-item-size">Size: ${item.size}</div>
            </div>
            <div>
              <div class="cart-item-price">$${item.price.toFixed(2)}</div>
              <button class="cart-remove" onclick="removeFromCart(${idx})">Remove</button>
            </div>
          </div>
        `).join('');
        document.getElementById('checkout-btn').disabled = false;
      }
      
      const total = cart.reduce((sum, item) => sum + item.price, 0);
      document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
    }
    
    function toggleCart() {
      document.getElementById('cart-sidebar').classList.toggle('open');
    }
    
    function checkout() {
      if (cart.length === 0) return;
      document.getElementById('checkout-modal').classList.add('open');
    }
    
    function closeModal() {
      document.getElementById('checkout-modal').classList.remove('open');
    }
    
    async function processPayment() {
      if (!stripe || !cardElement) {
        alert('Payment processing not configured. Please contact support.');
        return;
      }
      
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';
      
      try {
        // Create payment intent on backend
        const response = await fetch('/api/create-payment-intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: cart,
            amount: cart.reduce((sum, item) => sum + item.price * 100, 0),
          }),
        });
        
        if (!response.ok) throw new Error('Failed to create payment intent');
        
        const { clientSecret } = await response.json();
        
        // Confirm payment
        const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
          payment_method: {
            card: cardElement,
          },
        });
        
        if (error) {
          document.getElementById('card-errors').textContent = error.message;
          submitBtn.disabled = false;
          submitBtn.textContent = 'PAY NOW';
        } else if (paymentIntent.status === 'succeeded') {
          alert('Payment successful! Your order is confirmed.');
          cart = [];
          updateCart();
          closeModal();
          window.location.href = `/order-confirmation?order_id=${paymentIntent.id}`;
        }
      } catch (error) {
        document.getElementById('card-errors').textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'PAY NOW';
      }
    }
    
    // Close cart on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('cart-sidebar').classList.remove('open');
        document.getElementById('checkout-modal').classList.remove('open');
      }
    });
  </script>
</body>
</html>
