# Netlify Configuration for D.I.A. Storefront

[build]
  # No build step needed for static site
  publish = "."
  command = "npm install && echo 'D.I.A. storefront ready to deploy'"
  functions = ".netlify/functions"

[[redirects]]
  # API redirect to functions
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  # Stripe webhook
  from = "/webhooks/stripe"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  # Store page
  from = "/store"
  to = "/store.html"
  status = 200

[[redirects]]
  # Order confirmation page
  from = "/order-confirmation"
  to = "/order-confirmation.html"
  status = 200

[[redirects]]
  # SPA fallback — only for truly unmatched paths
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; script-src 'self' https: 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; style-src 'self' https: 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https: data:; img-src 'self' data: https:; connect-src 'self' https:"

# Cache policy
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (set these in Netlify dashboard)
# STRIPE_PUBLIC_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# PRINTFUL_API_TOKEN
